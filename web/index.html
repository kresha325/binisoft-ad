<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <!-- Restore deep links after GitHub Pages 404 redirect (?/dashboard → /dashboard). -->
  <script>
    (function (l) {
      if (l.search.length > 1 && l.search.charAt(1) === '/') {
        var decoded = l.search.slice(1).split('&').map(function (s) {
          return s.replace(/~and~/g, '&');
        }).join('?');
        window.history.replaceState(
          null,
          null,
          l.pathname.slice(0, -1) + decoded + l.hash
        );
      }
    }(window.location));
    (function () {
      var h = location.hash;
      if (!h || h === '#' || h === '#/') {
        location.replace(location.pathname + location.search + '#/login');
      }
    })();
  </script>

  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Binisoft Admin Dashboard — multi-tenant commerce admin.">
  <style>
    #binisoft-boot {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: linear-gradient(135deg, #0f1a33, #1a2b56 55%, #1a3a5c);
      color: #e2e8f0;
      font-family: system-ui, -apple-system, sans-serif;
      text-align: center;
      padding: 24px;
    }
    #binisoft-boot .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255, 255, 255, 0.2);
      border-top-color: #2dd4bf;
      border-radius: 50%;
      animation: binisoft-spin 0.9s linear infinite;
    }
    @keyframes binisoft-spin {
      to { transform: rotate(360deg); }
    }
    #binisoft-boot small {
      max-width: 280px;
      opacity: 0.75;
      line-height: 1.4;
    }
  </style>

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Binisoft Admin">
  <link rel="apple-touch-icon" href="icons/Icon-192.png?v=3">

  <!-- Favicon (v=3 busts cache; Icon-192 is sharp in browser tabs) -->
  <link rel="icon" type="image/png" sizes="192x192" href="icons/Icon-192.png?v=3"/>
  <link rel="icon" type="image/png" sizes="48x48" href="favicon.png?v=3"/>
  <link rel="shortcut icon" type="image/png" href="icons/Icon-192.png?v=3"/>

  <title>Binisoft Admin Dashboard</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://firestore.googleapis.com">
  <link rel="preconnect" href="https://firebase.googleapis.com">
</head>
<body>
  <div id="binisoft-boot" aria-live="polite">
    <div class="spinner" aria-hidden="true"></div>
    <strong>Binisoft Admin</strong>
    <small id="binisoft-boot-hint">Loading login… first visit can take 1–2 min on phone (Wi‑Fi).</small>
  </div>
  <script>
    (function () {
      if (location.pathname.indexOf('binisoft-ad') === -1) {
        var wrong = document.getElementById('binisoft-boot-hint');
        if (wrong) {
          wrong.textContent = 'Wrong link — open: https://kresha325.github.io/binisoft-ad/';
        }
      }
    })();
    (function () {
      try {
        var c = document.createElement('canvas');
        if (!(c.getContext('webgl2') || c.getContext('webgl'))) {
          var hint = document.getElementById('binisoft-boot-hint');
          if (hint) hint.textContent = 'WebGL required — use Safari/Chrome (not Instagram browser).';
        }
      } catch (e) {}
    })();
  </script>
  <script src="flutter_bootstrap.js?v=7" defer></script>
  <script>
    function hideBinisoftBoot() {
      var el = document.getElementById('binisoft-boot');
      if (!el) return;
      el.style.transition = 'opacity 0.35s';
      el.style.opacity = '0';
      setTimeout(function () { if (el.parentNode) el.remove(); }, 400);
    }
    // Hide only after Flutter login/landing paints — not on first-frame (avoids white flash).
    window.addEventListener('binisoft-ready', hideBinisoftBoot);
    window.addEventListener('error', function (e) {
      var hint = document.getElementById('binisoft-boot-hint');
      if (hint && e.message) hint.textContent = 'Error: ' + e.message;
    });
    setTimeout(function () {
      if (!document.getElementById('binisoft-boot')) return;
      var hint = document.getElementById('binisoft-boot-hint');
      if (hint) {
        hint.textContent = 'Still loading… Use Wi‑Fi. URL: kresha325.github.io/binisoft-ad/';
      }
    }, 90000);
  </script>
</body>
</html>
