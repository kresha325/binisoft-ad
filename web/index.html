<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <!-- Restore deep links after GitHub Pages 404 redirect (?/dashboard → /dashboard). -->
  <script>
    (function () {
      var CACHE_KEY = 'binisoft_web_cache_v';
      var CACHE_VERSION = '15';
      if ('serviceWorker' in navigator && localStorage.getItem(CACHE_KEY) !== CACHE_VERSION) {
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          return Promise.all(regs.map(function (r) { return r.unregister(); }));
        }).finally(function () {
          localStorage.setItem(CACHE_KEY, CACHE_VERSION);
        });
      }
    })();
    (function (l) {
      if (l.search.length > 1 && l.search.charAt(1) === '/') {
        var decoded = l.search.slice(1).split('&').map(function (s) {
          return s.replace(/~and~/g, '&');
        }).join('?');
        window.history.replaceState(
          null,
          null,
          l.pathname.slice(0, -1) + decoded + l.hash
        );
      }
    }(window.location));
    (function () {
      var h = location.hash;
      if (!h || h === '#') {
        var target = location.pathname + location.search + '#/';
        if (history.replaceState) {
          history.replaceState(null, '', target);
        } else {
          location.replace(target);
        }
      }
    })();
  </script>

  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Binisoft Admin Dashboard — multi-tenant commerce admin.">
  <style>
    #binisoft-boot {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: linear-gradient(135deg, #0f1a33, #1a2b56 55%, #1a3a5c);
      color: #e2e8f0;
      font-family: system-ui, -apple-system, sans-serif;
      text-align: center;
      padding: 24px;
    }
    #binisoft-boot .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255, 255, 255, 0.2);
      border-top-color: #2dd4bf;
      border-radius: 50%;
      animation: binisoft-spin 0.9s linear infinite;
    }
    @keyframes binisoft-spin {
      to { transform: rotate(360deg); }
    }
    #binisoft-boot small {
      max-width: 280px;
      opacity: 0.75;
      line-height: 1.4;
    }
    #binisoft-boot-progress-wrap {
      width: min(240px, 80vw);
      height: 4px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 4px;
      overflow: hidden;
    }
    #binisoft-boot-progress {
      height: 100%;
      width: 0;
      background: #2dd4bf;
      border-radius: 4px;
      transition: width 0.3s ease;
    }
    html, body {
      margin: 0;
      height: 100%;
      background: #0f1a33;
    }
    flutter-view, flt-scene-host, flt-glass-pane {
      background: #0f1a33;
    }
  </style>

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Binisoft Admin">
  <link rel="apple-touch-icon" href="icons/Icon-192.png?v=3">

  <!-- Favicon (v=3 busts cache; Icon-192 is sharp in browser tabs) -->
  <link rel="icon" type="image/png" sizes="192x192" href="icons/Icon-192.png?v=3"/>
  <link rel="icon" type="image/png" sizes="48x48" href="favicon.png?v=3"/>
  <link rel="shortcut icon" type="image/png" href="icons/Icon-192.png?v=3"/>

  <title>Binisoft Admin Dashboard</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preload" href="flutter_bootstrap.js?v=15" as="script">
  <link rel="preload" href="main.dart.js" as="script">
  <link rel="preload" href="canvaskit/canvaskit.wasm" as="fetch" type="application/wasm" crossorigin>
  <link rel="preload" href="canvaskit/canvaskit.js" as="script">
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://firestore.googleapis.com">
  <link rel="preconnect" href="https://firebase.googleapis.com">
</head>
<body>
  <div id="binisoft-boot" aria-live="polite">
    <div class="spinner" aria-hidden="true"></div>
    <strong>Binisoft Admin</strong>
    <div id="binisoft-boot-progress-wrap" aria-hidden="true">
      <div id="binisoft-boot-progress"></div>
    </div>
    <small id="binisoft-boot-hint">Loading… use Safari or Chrome (not in-app browser).</small>
  </div>
  <script>
    function binisoftBootHint(text, pct) {
      var hint = document.getElementById('binisoft-boot-hint');
      var bar = document.getElementById('binisoft-boot-progress');
      if (hint && text) hint.textContent = text;
      if (bar && typeof pct === 'number') bar.style.width = Math.min(100, pct) + '%';
    }
    (function () {
      var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
        (navigator.userAgent.includes('Macintosh') && navigator.maxTouchPoints > 1);
      if (isIOS) {
        binisoftBootHint('iPhone: first visit ~13 MB on Wi‑Fi — can take 5 min. Do not close Safari.', 5);
      }
    })();
    (function () {
      if (typeof PerformanceObserver === 'undefined') return;
      var approxTotal = 13 * 1024 * 1024;
      var loadedBytes = 0;
      var seen = {};
      try {
        var po = new PerformanceObserver(function (list) {
          list.getEntries().forEach(function (entry) {
            var name = entry.name || '';
            if (seen[name]) return;
            if (/main\.dart\.js|canvaskit\.wasm|canvaskit\.js|flutter_bootstrap/.test(name)) {
              seen[name] = true;
              loadedBytes += entry.transferSize || entry.encodedBodySize || 0;
              var pct = Math.round((loadedBytes / approxTotal) * 100);
              binisoftBootHint('Downloading… ' + Math.round(loadedBytes / 1024 / 1024) + ' MB', pct);
            }
          });
        });
        po.observe({ type: 'resource', buffered: true });
      } catch (e) {}
    })();
    (function () {
      if (location.pathname.indexOf('binisoft-ad') === -1) {
        var wrong = document.getElementById('binisoft-boot-hint');
        if (wrong) {
          wrong.textContent = 'Wrong link — open: https://kresha325.github.io/binisoft-ad/';
        }
      }
    })();
    (function () {
      try {
        var c = document.createElement('canvas');
        if (!(c.getContext('webgl2') || c.getContext('webgl'))) {
          var hint = document.getElementById('binisoft-boot-hint');
          if (hint) hint.textContent = 'WebGL required — use Safari/Chrome (not Instagram browser).';
        }
      } catch (e) {}
    })();
  </script>
  <script src="flutter_bootstrap.js?v=15" defer></script>
  <script>
    var bootShownAt = Date.now();
    var MIN_BOOT_MS = 1500;
    var flutterPainted = false;
    function hideBinisoftBoot() {
      var el = document.getElementById('binisoft-boot');
      if (!el) return;
      el.style.transition = 'opacity 0.35s';
      el.style.opacity = '0';
      setTimeout(function () { if (el.parentNode) el.remove(); }, 400);
    }
    // Hide after Flutter paints; keep overlay at least MIN_BOOT_MS (avoids white flash on mobile).
    window.addEventListener('binisoft-ready', function () {
      var wait = Math.max(0, MIN_BOOT_MS - (Date.now() - bootShownAt));
      setTimeout(hideBinisoftBoot, wait);
    });
    window.addEventListener('error', function (e) {
      var hint = document.getElementById('binisoft-boot-hint');
      if (hint && e.message) hint.textContent = 'Error: ' + e.message;
    });
    window.addEventListener('unhandledrejection', function (e) {
      var hint = document.getElementById('binisoft-boot-hint');
      var msg = e.reason && (e.reason.message || e.reason);
      if (hint && msg) hint.textContent = 'Error: ' + msg;
    });
    setTimeout(function () {
      var hint = document.getElementById('binisoft-boot-hint');
      if (hint && !flutterPainted) {
        hint.textContent = 'Downloading app (~13 MB)… keep Safari open on Wi‑Fi.';
      }
    }, 20000);
    setTimeout(function () {
      var hint = document.getElementById('binisoft-boot-hint');
      if (hint && !flutterPainted) {
        hint.textContent = 'Still loading on slow networks… wait or reload when on Wi‑Fi.';
      }
    }, 60000);
    setTimeout(function () {
      if (!document.getElementById('binisoft-boot') || flutterPainted) return;
      var hint = document.getElementById('binisoft-boot-hint');
      if (hint) {
        hint.textContent = 'App did not start. Reload the page. If it repeats, open on Wi‑Fi (not mobile data).';
      }
    }, 120000);
    (function watchFlutter() {
      var check = function () {
        var el = document.querySelector('flutter-view');
        if (el && el.offsetWidth > 0 && el.offsetHeight > 0) {
          flutterPainted = true;
          window.dispatchEvent(new Event('binisoft-ready'));
          return;
        }
        setTimeout(check, 400);
      };
      setTimeout(check, 800);
    })();
  </script>
</body>
</html>
