name: Deploy Web to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build web (GitHub Pages subpath, CanvasKit via CDN for mobile)
        run: flutter build web --release --base-href "/binisoft-ad/" --web-resources-cdn

      - name: Mobile-friendly web bootstrap (no SW cache, CDN canvaskit)
        run: dart run tool/patch_web_bootstrap.dart

      - name: Sharp favicon (launcher_icons outputs 16px; tabs need 48px+)
        run: dart run tool/generate_app_icon_square.dart

      - name: SPA fallback for GitHub Pages deep links
        run: |
          cp web/404.html build/web/404.html
          dart run tool/generate_spa_path_indexes.dart

      - name: Disable Jekyll
        run: touch build/web/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
