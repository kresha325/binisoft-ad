name: business_dashboard
description: Multi-tenant SaaS commerce admin dashboard for jon-sport (Firebase).
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.3
  cloud_firestore: ^5.6.7
  firebase_storage: ^12.4.5
  http: ^1.2.2

  # State & routing
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1

  google_fonts: ^6.2.1
  web: ^1.1.1

  # Utils
  equatable: ^2.0.7
  crypto: ^3.0.6
  uuid: ^4.5.1
  intl: ^0.20.2
  collection: ^1.19.1
  file_picker: ^8.1.7
  mime: ^2.0.0
  image: ^4.5.4
  shared_preferences: ^2.5.3
  url_launcher: ^6.3.2
  pdf: ^3.12.0
  printing: ^5.14.3
  share_plus: ^12.0.2
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/app_icon_square.png
  adaptive_icon_background: "#1A2B56"
  adaptive_icon_foreground: assets/branding/app_icon_square.png
  web:
    generate: true
    image_path: assets/branding/app_icon_square.png
    background_color: "#1A2B56"
    theme_color: "#1A2B56"

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/fonts/
    - assets/branding/binisoft_logo.png
    - assets/branding/binisoft_logo_dark.png
    - assets/branding/app_icon.png
    - assets/branding/app_icon_square.png
    - assets/backgrounds/
